name: Generate Keystore

on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          PASSWORD=dancelog2026
          keytool -genkey -v -keystore dance-log.keystore \
            -alias dance-log \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=DanceLog, OU=App, O=DanceLog, L=Unknown, ST=Unknown, C=CN"

      - name: Base64 encode for GitHub Secrets
        run: |
          echo "=== 复制下面这一整段到 KEYSTORE_BASE64 ==="
          base64 dance-log.keystore
          echo ""
          echo "=== 其他 Secret 值 ==="
          echo "KEYSTORE_PASSWORD: dancelog2026"
          echo "KEY_ALIAS: dance-log"
          echo "KEY_PASSWORD: dancelog2026"
