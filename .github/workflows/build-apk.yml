name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          target-sdk: 34

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Bump version
        run: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          sed -i "s/versionCode 1/versionCode $BUILD_NUM/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.$BUILD_NUM\"/" android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sign APK (if keystore configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No keystore configured, skipping signing"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            "$KEY_ALIAS"
          rm keystore.jks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dance-log-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
